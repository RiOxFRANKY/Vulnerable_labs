version: 2
updates:
  # Keep the GitHub Actions used by the CI pipeline up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci

  # Track updates to the (single) client dependency.
  # NOTE: the lab *images* are intentionally outdated and must NOT be bumped.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: deps
    labels:
      - dependencies
