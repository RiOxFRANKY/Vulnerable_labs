name: CI

# Continuous integration for the Vulnerable_labs repository.
#
# This repo ships intentionally vulnerable environments plus first-party Python
# exploit clients. The pipeline therefore does NOT scan the lab images for CVEs
# (they are vulnerable on purpose); instead it enforces that the exploit clients
# are syntactically sound and linted, that every docker-compose file is valid,
# that Dockerfiles/shell scripts are clean, and that no *real* secrets leak in.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff==0.15.15"
      - name: Lint exploit clients
        run: ruff check --output-format=github .

  python-compile:
    name: Python syntax (py_compile)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The clients target Python 3.6+; verify across the supported range.
        python-version: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile all first-party Python files
        run: bash scripts/compile-clients.sh

  compose-validate:
    name: Validate docker-compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show docker compose version
        run: docker compose version
      - name: Validate every compose file
        run: bash scripts/validate-compose.sh

  dockerfile-lint:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - docker/unauthorized-rce/Dockerfile
          - tomcat/CVE-2017-12615/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          # These are deliberately old/insecure base images; don't fail the build
          # on "pin your versions" style warnings, only on hard errors.
          failure-threshold: error

  shell-lint:
    name: Lint shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # Only repo-owned scripts are linted. docker/unauthorized-rce/docker-entrypoint.sh
        # is upstream Docker-in-Docker boilerplate and is intentionally left as-is.
        run: |
          shopt -s globstar nullglob
          files=(scripts/**/*.sh)
          echo "Checking: ${files[*]}"
          shellcheck "${files[@]}"

  yaml-lint:
    name: Lint repo YAML (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint workflow and config YAML
        # Vendored compose files are validated by compose-validate, not here.
        run: yamllint -c .yamllint.yml .github .yamllint.yml .pre-commit-config.yaml

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect \
              --source /repo \
              --config /repo/.gitleaks.toml \
              --redact \
              --no-banner \
              --verbose

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs:
      - python-lint
      - python-compile
      - compose-validate
      - dockerfile-lint
      - shell-lint
      - yaml-lint
      - secret-scan
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
